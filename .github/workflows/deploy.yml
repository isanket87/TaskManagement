name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: VITE_GA_TRACKING_ID
          script: |
            cd /var/www/brioright
            chmod +x deploy.sh
            VITE_GA_TRACKING_ID=${{ secrets.VITE_GA_TRACKING_ID }} ./deploy.sh
